<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Discovery</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header class="p-3 border-bottom border-2">
        <nav class="navbar container d-flex justify-content-between align-items-center">
            <div class="d-flex align-items-center gap-3">
                <div class="p-3 bg-gradient rounded-4 from-blue-600 to-purple-600 rounded-2xl shadow-lg"><svg
                        xmlns="http://www.w3.org/2000/svg" width="27" height="27" viewBox="0 0 24 24" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        class="lucide lucide-briefcase w-8 h-8 text-white">
                        <path d="M16 20V4a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"></path>
                        <rect width="20" height="14" x="2" y="6" rx="2"></rect>
                    </svg></div>
                <div>
                    <h2 class="m-0 fs-2 fw-medium">Job Discovery</h2>
                    <p class="m-0 fs-6 text-muted">Find your dream career</p>
                </div>
            </div>
            <button class="btn border bg-white d-flex align-items-center gap-2 fw-medium" onclick="showBookmarks()">
                <div>
                    <svg xmlns="http://www.w3.org/2000/svg" class="text-dark fw-bold" width="20" height="16" fill="none"
                        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                        viewBox="0 0 24 24">
                        <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"></path>
                    </svg>
                </div></i> Bookmark(<span id="bookmark-count">0</span>)
            </button>
        </nav>

        <form class="container my-3 d-flex flex-column gap-2">
            <div class="input-group">
                <input id="search-input" type="text" class="form-control rounded-4 p-3 border-2 bg-light"
                    placeholder="Search by job title, company, keywords...">
            </div>

            <div class="d-flex align-items-center gap-2 flex-nowrap">
                <input id="location-input" type="text" class="form-control rounded-4 p-2 border-2 bg-light flex-grow-1"
                    placeholder="Filter By Location">
                <div class="d-flex gap-2 flex-nowrap">
                    <button type="button" class="btn btn-filter text-dark border  bg-white rounded-4">All</button>
                    <button type="button" class="btn btn-filter text-dark border bg-white rounded-4">Full-time</button>
                    <button type="button" class="btn btn-filter text-dark border bg-white rounded-4">Part-time</button>
                    <button type="button" class="btn btn-filter text-dark border bg-white rounded-4">Contract</button>
                    <button type="button" class="btn btn-filter text-dark border bg-white rounded-4">Remote</button>
                </div>
            </div>
        </form>
    </header>
    <main>
        <section class="container p-4 min-vh-100">
            <p>Showing <span id="job-count" class="text-primary">0</span> jobs</p>
            <div id="jobs-section" class="row g-4"></div>

            <!-- Modal -->
            <div class="modal fade" id="jobModal" tabindex="-1" aria-labelledby="jobModalLabel" aria-hidden="true">
                <div class="modal-dialog modal-lg">
                    <div class="modal-content">

                        <div class="modal-body" id="modalContent">
                        </div>
                        <div class="modal-footer d-flex gap-1">
                            <button class="btn bg-gradient text-white flex-grow-1">Apply Now</button>
                            <button class="btn bg-light" data-bs-dismiss="modal">Close</button>
                        </div>
                    </div>
                </div>
            </div>
        </section>

    </main>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
